name: create-docker-image-backend

on:
  push:
    branchs:
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: clone code
        uses: actions/checkout@v4

      - name: setup docker buildx
        uses: docker/setup-buildx-action@v3

      - name: login docker hub
        users: docker/login-action@v3.4.0
        with:
          username: ${{secrets.DOCKERHUB_USERNAME}}
          password: ${{secrets.DOCKERHUB_TOKEN}}

      - name: calculate tag version for dockerhub
        run: echo 'NEW_VERSION=$(( ${{github.run_number}} + 2))' >> $GITHUB_ENV

      - name: docker image build
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/finance-management-backend:latest
            ${{ secrets.DOCKER_USERNAME }}/finance-management-backend:v${{ env.NEW_VERSION }}

      - name: trigger on koyeb
        run: |
          curl -X POST https://app.koyeb.com/v1/services/${{ secrets.KOYEB_ID_SERVICE }}/redeploy \
            -H "Authorization: Bearer ${{ secrets.KOYEB_API_TOKEN }}"